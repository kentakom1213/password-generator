name: Build wasm

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build wasm
        run: cargo build --release --target wasm32-wasip1

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-generator-wasm
          path: target/wasm32-wasip1/release/password-generator.wasm

      - name: Detect Cargo.toml version change
        id: cargo-version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          current_version=$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')
          previous_version=$(git show "${{ github.event.before }}:Cargo.toml" 2>/dev/null | python3 -c 'import sys, tomllib; data = sys.stdin.buffer.read(); print(tomllib.loads(data.decode())["package"]["version"] if data else "")')

          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          if [ "${current_version}" != "${previous_version}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.cargo-version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.cargo-version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            target/wasm32-wasip1/release/password-generator.wasm \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}"
